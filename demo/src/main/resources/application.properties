# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=${SERVER_PORT}
frontend.url=${FRONTEND_URL}

# ===============================
# CONFIGURACIÓN DE CLOCKIFY
# ===============================
clockify.api.url=${CLOCKIFY_BASE_URL}
clockify.workspace.id=${CLOCKIFY_WORKSPACE_ID}

spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]
app.reset-password-url=${RESET_PASSWORD_URL:${FRONTEND_URL}/HTML/restablecer.html}
spring.mail.host=${SMTP_HOST:smtp.resend.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:resend}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000