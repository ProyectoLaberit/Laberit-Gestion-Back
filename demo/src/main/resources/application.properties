spring.application.name=demo
server.port=${SERVER_PORT:8080}

# URL de conexión (se obtiene del archivo .env)
spring.datasource.url=${DB_URL}

# Credenciales de acceso (se obtienen del archivo .env)
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Indica que el driver a usar es el de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Mantiene la tabla actualizada según las clases de Java
spring.jpa.hibernate.ddl-auto=update

# Permite ver en la consola las consultas que Java hace a la nube
spring.jpa.show-sql=true